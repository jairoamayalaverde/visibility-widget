<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Visibility Score v2.5 | Análisis Visual Mejorado</title>
    <meta name="description" content="Descubre en 3 minutos si tu perfil de LinkedIn te hace destacar o te hace invisible. Modelo determinístico VS = 0.30·AT + 0.30·AC + 0.40·CV">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #060810;
            --bg2:        #0c0f1a;
            --bg3:        #111525;
            --border:     #1e2235;
            --border2:    #2a2f4a;
            --text:       #e8ecf5;
            --muted:      #6b7290;
            --muted2:     #3d4260;
            --cyan:       #00d4ff;
            --violet:     #7c3aed;
            --rose:       #f43f5e;
            --amber:      #f59e0b;
            --green:      #10b981;
            --font-display: 'Syne', sans-serif;
            --font-body:    'DM Sans', sans-serif;
            --font-mono:    'DM Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 20px 60px;
            line-height: 1.6;
        }

        /* ── SCORE + BREAKDOWN UNIFICADO ──────────────── */
        .score-breakdown-card {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .sbc-top {
            display: grid;
            grid-template-columns: 220px 1fr;
        }
        @media (max-width: 640px) {
            .sbc-top { grid-template-columns: 1fr; }
        }
        .sbc-score-col {
            padding: 32px 28px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        @media (max-width: 640px) {
            .sbc-score-col { border-right: none; border-bottom: 1px solid var(--border); padding: 24px; }
        }
        .sbc-vs-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 3px;
            margin-bottom: 4px;
        }
        .sbc-vs-number {
            font-family: var(--font-display);
            font-size: 80px;
            font-weight: 800;
            color: var(--cyan);
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 14px;
        }
        .sbc-vs-max {
            font-size: 22px;
            color: var(--muted2);
            font-weight: 400;
            letter-spacing: 0;
        }
        .sbc-level-badge {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 2px;
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid;
            margin-bottom: 10px;
            width: fit-content;
        }
        .sbc-level-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        /* ── RADAR CHART ──────────────────────────────────── */
        .radar-container {
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .radar-canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            margin-bottom: 24px;
        }

        .radar-canvas {
            width: 100%;
            height: 100%;
        }

        .radar-legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .radar-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        .radar-legend-icon {
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
        }

        .radar-legend-icon svg {
            width: 16px;
            height: 16px;
        }

        .radar-legend-label {
            flex: 1;
        }

        .radar-legend-value {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text);
            font-weight: 600;
        }

        /* ── PERSONALIZED QUOTE ───────────────────────────── */
        .personalized-quote {
            background: var(--bg3);
            border-left: 3px solid var(--cyan);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 20px;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 16px;
            color: var(--text);
            line-height: 1.6;
            text-align: center;
        }

        .personalized-quote::before {
            content: '"';
            font-size: 48px;
            color: var(--cyan);
            opacity: 0.3;
            line-height: 0;
            margin-right: 8px;
        }

        .personalized-quote::after {
            content: '"';
            font-size: 48px;
            color: var(--cyan);
            opacity: 0.3;
            line-height: 0;
            margin-left: 8px;
        }

        /* ── NICHE BADGE ──────────────────────────────────── */
        .niche-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--amber), #f97316);
            color: var(--bg);
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 24px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .niche-badge-icon {
            margin-right: 6px;
        }
        .sbc-dots { display: flex; gap: 6px; }
        .sbc-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border2);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted2);
        }
        .sbc-dot--on { color: var(--bg); font-weight: 700; }
        .sbc-dims-col { display: flex; flex-direction: column; }
        .cdc {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            border-left: 3px solid var(--cdc-color);
        }
        .cdc:last-child { border-bottom: none; }
        .cdc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .cdc-key { font-family: var(--font-mono); font-size: 12px; font-weight: 700; }
        .cdc-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
        .cdc-weight { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); }
        .cdc-score-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
        .cdc-score { font-family: var(--font-display); font-size: 32px; font-weight: 800; line-height: 1; }
        .cdc-status { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; }
        .cdc-ok { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); margin-left: auto; }
        .cdc-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
        .cdc-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
        .cdc-subpillars { display: flex; flex-direction: column; gap: 4px; padding-top: 4px; }
        .cdc-sp-row { display: flex; align-items: center; gap: 8px; }
        .cdc-sp-name { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); width: 70px; flex-shrink: 0; }
        .cdc-sp-track { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
        .cdc-sp-fill { height: 100%; border-radius: 1px; }
        .cdc-sp-val { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); width: 22px; text-align: right; }
        .sbc-meta {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 0;
        }
        .sbc-meta-item { display: flex; flex-direction: column; align-items: center; padding: 0 20px; gap: 2px; }
        .sbc-meta-item:first-child { padding-left: 0; }
        .sbc-meta-val { font-family: var(--font-display); font-size: 22px; font-weight: 800; line-height: 1; }
        .sbc-good     { color: var(--green); }
        .sbc-bad      { color: var(--rose); }
        .sbc-potential { color: var(--cyan); }
        .sbc-meta-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); letter-spacing: 1px; white-space: nowrap; }
        .sbc-meta-divider { width: 1px; height: 32px; background: var(--border); }
        .sbc-meta-profile { padding-left: 20px; align-items: flex-start; }
        .sbc-meta-url { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ── TRIGGER ALERT ────────────────────────────── */
        .trigger-alert {
            background: rgba(245,158,11,0.06);
            border: 1px solid rgba(245,158,11,0.35);
            border-left: 3px solid var(--amber);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .trigger-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .trigger-icon { font-size: 16px; }
        .trigger-title {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--amber);
            font-weight: 500;
            letter-spacing: 1px;
            flex: 1;
        }
        .trigger-penalty {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--rose);
            font-weight: 500;
        }
        .trigger-message {
            font-size: 14px;
            color: var(--muted);
            font-style: italic;
            line-height: 1.6;
        }

        /* ── LEVEL DOTS ────────────────────────────────── */
        .level-dots {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .level-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border2);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted2);
            transition: all 0.3s;
        }
        .level-dot.active { color: var(--bg); font-weight: 700; }

        /* ── BREAKDOWN HEADER ──────────────────────────── */
        .breakdown-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .breakdown-level-note {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted2);
        }

        /* ── NEXT LEVEL GAP ────────────────────────────── */
        .gap-section {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 20px;
        }
        .gap-header { margin-bottom: 18px; }
        .gap-desc {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }
        .gap-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .gap-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        .gap-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }
        .gap-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 3px;
        }
        .gap-action {
            font-size: 12px;
            color: var(--muted);
            font-style: italic;
            line-height: 1.5;
        }

        /* ── QUESTION HINT ─────────────────────────────── */
        .question-hint {
            font-size: 13px;
            color: var(--muted2);
            margin-top: 10px;
            padding: 10px 14px;
            background: var(--bg3);
            border-radius: 6px;
            border-left: 2px solid var(--border2);
            line-height: 1.5;
        }

        /* ── NOISE TEXTURE OVERLAY ─────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ── HERO HEADER ───────────────────────────────── */
        .hero-section {
            text-align: center;
            padding: 80px 0 60px;
        }

        .hero-eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 32px;
            opacity: 0.9;
        }

        .hero-section h1 {
            font-family: var(--font-display);
            font-size: clamp(48px, 8vw, 72px);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 28px;
            color: var(--text);
            letter-spacing: -2px;
        }

        .hero-section h1 em {
            font-style: normal;
            color: var(--cyan);
            display: block;
            margin-top: 8px;
        }

        .hero-section p {
            font-size: 16px;
            color: var(--muted);
            max-width: 640px;
            margin: 0 auto 36px;
            font-weight: 300;
            line-height: 1.6;
        }

        .hero-formula {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--cyan);
            background: transparent;
            border: 1px solid var(--border2);
            padding: 10px 24px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        /* ── INPUT BOX ─────────────────────────────────── */
        .input-box {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transition: border-color 0.3s;
        }

        .input-box:hover { border-color: var(--cyan); }

        .input-icon {
            font-size: 32px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .input-icon svg {
            width: 40px;
            height: 40px;
        }

        .input-box label {
            display: block;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .input-box input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 16px 20px;
            color: var(--text);
            font-size: 16px;
            font-family: var(--font-mono);
            margin-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .input-box input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
        }

        .input-box input::placeholder { color: var(--muted2); }

        .input-hint {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .input-error {
            font-size: 13px;
            color: var(--rose);
            margin-bottom: 12px;
        }

        .analyze-btn {
            width: 100%;
            background: var(--cyan);
            color: var(--bg);
            border: none;
            padding: 18px 32px;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .analyze-btn:hover {
            background: #33ddff;
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0,212,255,0.25);
        }

        .trust-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 11px;
            color: var(--muted2);
            flex-wrap: wrap;
            font-family: var(--font-mono);
        }

        /* ── ONBOARDING SCREEN ─────────────────────────── */
        .onboarding-screen {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
        }

        .onboarding-check {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--green);
            color: var(--bg);
            font-size: 32px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: check-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes check-pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .onboarding-url {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--cyan);
            margin-bottom: 32px;
            padding: 10px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: inline-block;
        }

        .onboarding-steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
            margin: 0 auto 28px;
            text-align: left;
        }

        .ob-step {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--muted2);
            font-family: var(--font-body);
            transition: color 0.3s;
            opacity: 0.4;
        }

        .ob-step.active { 
            color: var(--muted); 
            opacity: 1;
        }

        .ob-step.done { 
            color: var(--green); 
            opacity: 1;
        }

        .ob-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted2);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .ob-step.active .ob-dot { 
            background: var(--cyan); 
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .ob-step.done .ob-dot { 
            background: var(--green); 
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .onboarding-explainer {
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-left: 3px solid var(--cyan);
            border-radius: 10px;
            padding: 20px 24px;
            text-align: left;
            max-width: 480px;
            margin: 0 auto;
        }

        .onboarding-explainer p {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .onboarding-explainer p:last-child {
            margin-bottom: 0;
        }

        .onboarding-explainer strong {
            color: var(--text);
            font-weight: 600;
        }

        .ob-meta {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--muted2);
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 12px;
        }

        /* ── INSTRUCTIONS SCREEN (VISUAL/INTERACTIVE) ─── */
        .instructions-screen {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 44px 36px;
            text-align: center;
            max-width: 620px;
            margin: 0 auto;
        }

        .inst-header {
            margin-bottom: 32px;
        }

        .inst-icon {
            font-size: 42px;
            margin-bottom: 16px;
        }

        .inst-title {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .inst-subtitle {
            font-size: 15px;
            color: var(--muted);
        }

        .inst-demo-box {
            background: var(--bg3);
            border: 2px solid var(--border2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .inst-demo-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .inst-demo-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .inst-demo-btn {
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--border2);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .inst-demo-btn-icon {
            font-size: 20px;
            font-weight: 700;
        }

        .inst-demo-btn:hover {
            border-color: var(--cyan);
            transform: translateY(-2px);
        }

        .inst-demo-btn.yes-btn {
            border-color: var(--border2);
        }

// ============================================================
// LINKEDIN VISIBILITY SCORE WIDGET v2.0
// Motor con detección de nivel por sensores + pesos dinámicos
// Formula: VS = 0.30·AT(level) + 0.30·AC + 0.40·CV
// ============================================================

const CONFIG = {

    // ── PESOS DINÁMICOS AT POR NIVEL ─────────────────────────

        1: { pv: 0.70, cl: 0.30, af: 0.00 },
        2: { pv: 0.55, cl: 0.30, af: 0.15 },
        3: { pv: 0.45, cl: 0.30, af: 0.25 },
        4: { pv: 0.40, cl: 0.25, af: 0.35 }
    },

    dimensionWeights: { AT: 0.30, AC: 0.30, CV: 0.40 },

    // ── SENSORES DE NIVEL ────────────────────────────────────
    levelSensors: {
        1: {
            name: 'EXPLORACIÓN',
            color: '#6b7280',
            desc: 'Existes en LinkedIn, pero el sistema no sabe qué hacer contigo.',
            positiveSignals: [],
            negativeSignals: ['pv_headline', 'ac_frecuencia', 'pv_about'],
            threshold: 2

function initFactors() {
    STATE.allFactors = Object.entries(CONFIG.factors).map(([id, f]) => ({ id, ...f }));
}

function render() {
    const app = document.getElementById('app');
    switch (STATE.view) {
        case 'input':        app.innerHTML = renderInput();        attachInputListeners();        break;
        case 'onboarding':   app.innerHTML = renderOnboarding();   runOnboarding();               break;
        case 'instructions': app.innerHTML = renderInstructions(); attachInstructionsListeners(); break;
        case 'quiz':         app.innerHTML = renderQuiz();         attachQuizListeners();         break;
        case 'analyzing':    app.innerHTML = renderAnalyzing();    break;
        case 'results':      app.innerHTML = renderResults();      attachResultsListeners();      break;
        case 'success':      app.innerHTML = renderSuccess();      break;
        case 'error':        app.innerHTML = renderError();        attachErrorListeners();        break;
    }
    notifyParentHeight();
}

function attachInputListeners() {
    document.getElementById('profile-input').addEventListener('keypress', e => { if (e.key === 'Enter') startQuiz(); });
    document.getElementById('analyze-btn').addEventListener('click', startQuiz);
}

function startQuiz() {
    let url = document.getElementById('profile-input').value.trim();
    if (!url) { showInputError('Ingresa tu URL de LinkedIn'); return; }
    if (!url.includes('linkedin')) url = 'linkedin.com/in/' + url.replace(/^@/, '');
    STATE.profileUrl = url;
    STATE.currentQuestion = 0;
    STATE.answers = {};
    STATE.view = 'onboarding';
    render();
}

function showInputError(msg) {
    document.querySelector('.input-error')?.remove();
    const err = document.createElement('p');
    err.className = 'input-error';
    err.textContent = msg;
    document.getElementById('profile-input').after(err);
}

    await delay(400);

    await delay(800);
    document.getElementById('ob-step-1')?.classList.add('done');
    document.getElementById('ob-step-2')?.classList.add('active');
    await delay(900);
    document.getElementById('ob-step-2')?.classList.add('done');
    document.getElementById('ob-step-3')?.classList.add('active');
    await delay(1000);

        return `

                <div class="quiz-progress">
                    <div class="quiz-progress-track">
                        <div class="quiz-progress-fill" style="width:0%"></div>

                        <span>17 factores después</span>

                    <h2>¿A qué nicho o sector sirves?</h2>

    return `
        <div class="quiz-container">
            <div class="quiz-progress">
                <div class="quiz-progress-track">
                    <div class="quiz-progress-fill" style="width:${progress}%"></div>
                </div>
                <div class="quiz-progress-label">
                    <span>${STATE.currentQuestion + 1} / ${total}</span>
                    <span>${total - STATE.currentQuestion} restantes</span>

            <div class="quiz-meta">
                <span class="dimension-badge" style="color:${dimColors[factor.dimension]};border-color:${dimColors[factor.dimension]}44;background:${dimColors[factor.dimension]}11">
                    ${dimLabels[factor.dimension]}
                </span>
                <span class="pillar-label">${pillarNames[factor.pillar]} · ${factor.weight}pts</span>
                ${factor.critical ? '<span class="critical-badge">CRÍTICO</span>' : ''}

            <div class="quiz-question">
                <div class="question-number">P${STATE.currentQuestion + 1}</div>
                <h2>${factor.label}</h2>

                ${factor.hint ? `<p class="question-hint">💡 ${factor.hint}</p>` : ''}

            <div class="quiz-answers">
                <button class="answer-btn answer-yes" data-answer="true">
                    <span class="answer-icon">✓</span>
                    <span class="answer-text">Sí, lo tengo</span>
                </button>
                <button class="answer-btn answer-no" data-answer="false">
                    <span class="answer-icon">✗</span>
                    <span class="answer-text">No / Parcialmente</span>
                </button>
            </div>
            <div class="quiz-profile-ref">Analizando: <span>${STATE.profileUrl}</span></div>
        </div>
    `;
}

function attachQuizListeners() {
    // Si es la pregunta de nicho
    const nicheInput = document.getElementById('niche-input');
    const nicheContinue = document.getElementById('niche-continue');
    
    if (nicheInput && nicheContinue) {
        nicheInput.addEventListener('input', () => {
            nicheContinue.disabled = nicheInput.value.trim().length < 5;
        });
        
        nicheContinue.addEventListener('click', () => {
            STATE.nicheText = nicheInput.value.trim();
            render();
        });
        
        nicheInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && nicheInput.value.trim().length >= 5) {
                STATE.nicheText = nicheInput.value.trim();
                render();
            }
        });
        
        return;
    }
    
    // Quiz normal de factores
    document.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const answer = btn.dataset.answer === 'true';
            STATE.answers[STATE.allFactors[STATE.currentQuestion].id] = answer;
            btn.classList.add('selected');
            setTimeout(() => {
                STATE.currentQuestion++;
                if (STATE.currentQuestion >= STATE.allFactors.length) {
                    STATE.view = 'analyzing';
                    render();
                    setTimeout(runScoring, 600);
                } else {
                    render();
                }
            }, 220);
        });
    });
}

async function runScoring() {
    const stepTexts = [
        'Detectando nivel de madurez...',
        'Aplicando pesos dinámicos AT...',
        'Calculando Alcance (AC)...',
        'Calculando Conversión (CV)...',
        'Evaluando triggers de ajuste...',
        'Generando plan de intervención...'
    ];
    for (let i = 0; i < stepTexts.length; i++) {
        const txt = document.getElementById('loading-text');
        const step = document.getElementById(`step-${i}`);
        if (txt) txt.textContent = stepTexts[i];
        if (step) step.classList.add('active');
        await delay(380);
        if (i === 0) STATE.detectedLevel = detectLevel();
        if (i === 1) calculateScores();
        if (i === 4) evaluateTriggers();
        if (i === 5) {
            STATE.interventions = generateInterventions();
            STATE.potentialScore = calculatePotentialScore();
            STATE.nextLevelGap = getNextLevelGap();
        }
        if (step) step.classList.add('done');
    }
    await delay(250);
    STATE.view = 'results';
    render();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function detectLevel() {
    for (let lvl = 4; lvl >= 1; lvl--) {
        const sensor = CONFIG.levelSensors[lvl];
        if (sensor.positiveSignals.length === 0) {
            const negCount = sensor.negativeSignals.filter(id => !STATE.answers[id]).length;
            if (negCount >= sensor.threshold) return lvl;
        } else {
            const posCount = sensor.positiveSignals.filter(id => STATE.answers[id]).length;
            if (posCount >= sensor.threshold) return lvl;
        }
    }
    return 1;
}

function calculateScores() {
    const level = STATE.detectedLevel;
    const w = CONFIG.authorityWeights[level];

    const pvFactors = STATE.allFactors.filter(f => f.dimension === 'AT' && f.pillar === 'PV');
    const clFactors = STATE.allFactors.filter(f => f.dimension === 'AT' && f.pillar === 'CL');
    const afFactors = STATE.allFactors.filter(f => f.dimension === 'AT' && f.pillar === 'AF');

    const PV = rawScore(pvFactors);
    const CL = rawScore(clFactors);
    const AF = rawScore(afFactors);
    const AT = Math.round(PV * w.pv + CL * w.cl + AF * w.af);

    const AC = Math.round(rawScore(STATE.allFactors.filter(f => f.dimension === 'AC')));
    const CV = Math.round(rawScore(STATE.allFactors.filter(f => f.dimension === 'CV')));
    const VS_base = Math.round(AT * 0.30 + AC * 0.30 + CV * 0.40);

    STATE.scores = { AT, AC, CV, VS: VS_base, PV: Math.round(PV), CL: Math.round(CL), AF: Math.round(AF), VS_base };
}

function rawScore(factors) {
    if (!factors.length) return 0;
    let total = 0, achieved = 0;
    factors.forEach(f => { total += f.weight; if (STATE.answers[f.id]) achieved += f.weight; });
    return total > 0 ? (achieved / total) * 100 : 0;
}

function evaluateTriggers() {
    STATE.triggersActivated = [];
    Object.entries(CONFIG.triggers).forEach(([key, trigger]) => {
        if (trigger.condition(STATE.detectedLevel, STATE.scores)) {
            STATE.triggersActivated.push({ key, ...trigger });
            STATE.scores.VS = Math.max(0, STATE.scores.VS - trigger.penalty);
        }
    });
}

function generateInterventions() {
    const dimW = { CV: 0.40, AT: 0.30, AC: 0.30 };
    const w = CONFIG.authorityWeights[STATE.detectedLevel];
    return STATE.allFactors
        .filter(f => !STATE.answers[f.id])
        .map(f => {
            const pillarMult = f.dimension === 'AT'
                ? (f.pillar === 'PV' ? w.pv : f.pillar === 'CL' ? w.cl : w.af)
                : 1;
            return { ...f, impact: Math.round(f.weight * dimW[f.dimension] * pillarMult * 3.5) };
        })
        .sort((a, b) => {
            if (a.critical && !b.critical) return -1;
            if (!a.critical && b.critical) return 1;
            return b.impact - a.impact;
        })
        .slice(0, 5)
        .map(f => ({
            id: f.id, label: f.label, dimension: f.dimension,
            pillar: f.pillar, critical: f.critical, impact: f.impact,
            action: CONFIG.actions[f.id] || 'Optimizar este factor en tu perfil'
        }));
}

function calculatePotentialScore() {
    const triggerRecovery = STATE.triggersActivated.reduce((s, t) => s + t.penalty, 0);
    const gain = STATE.interventions.reduce((s, t) => s + t.impact, 0);
    return Math.min(STATE.scores.VS + triggerRecovery + gain, 100);
}

function getNextLevelGap() {
    if (STATE.detectedLevel >= 4) return [];
    const nextSensor = CONFIG.levelSensors[STATE.detectedLevel + 1];
    return nextSensor.positiveSignals
        .filter(id => !STATE.answers[id])
        .map(id => ({ id, label: CONFIG.factors[id]?.label || id, action: CONFIG.actions[id] || '' }));
}

    return `

            </div>
            ${subpillars.length ? `

function generateRadarChart(scores) {
    const dimensions = [
        { key: 'PV', label: 'Propuesta de Valor', shortLabel: 'PV', icon: '👤', value: scores.PV || 0 },
        { key: 'CL', label: 'Claridad de Nicho', shortLabel: 'CL', icon: '🎯', value: scores.CL || 0 },
        { key: 'AF', label: 'Autoridad y Framework', shortLabel: 'AF', icon: 'linkedin', value: scores.AF || 0 },
        { key: 'AC', label: 'Actividad Consistente', shortLabel: 'AC', icon: '📝', value: scores.AC || 0 },
        { key: 'CV', label: 'Conversión Visible', shortLabel: 'CV', icon: '💬', value: scores.CV || 0 }
    ];

    const size = 400;
    const center = size / 2;
    const maxRadius = 140;
    const levels = 5;

    const angleStep = (Math.PI * 2) / dimensions.length;
    const startAngle = -Math.PI / 2;

    const points = dimensions.map((dim, i) => {
        const angle = startAngle + angleStep * i;
        const radius = (dim.value / 100) * maxRadius;
        return {
            x: center + Math.cos(angle) * radius,
            y: center + Math.sin(angle) * radius,
            angle: angle,
            dim: dim
        };
    });

    const pathData = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x},${p.y}`).join(' ') + ' Z';

    // Círculos de nivel más visibles
    let levelCircles = '';
    for (let i = 1; i <= levels; i++) {
        const r = (maxRadius / levels) * i;
        const opacity = i === levels ? 0.15 : 0.08;
        const strokeWidth = i === levels ? 1.5 : 1;
        levelCircles += `<circle cx="${center}" cy="${center}" r="${r}" fill="none" stroke="rgba(0,212,255,${opacity})" stroke-width="${strokeWidth}"/>`;
    }

    // Líneas radiales más visibles
    let radialLines = '';
    dimensions.forEach((_, i) => {
        const angle = startAngle + angleStep * i;
        const endX = center + Math.cos(angle) * maxRadius;
        const endY = center + Math.sin(angle) * maxRadius;
        radialLines += `<line x1="${center}" y1="${center}" x2="${endX}" y2="${endY}" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>`;
    });

    // Labels y valores en los vértices
    let labels = '';
    points.forEach((p, i) => {
        const labelDistance = maxRadius + 35;
        const labelX = center + Math.cos(p.angle) * labelDistance;
        const labelY = center + Math.sin(p.angle) * labelDistance;
        
        // Ajuste de alineación según posición
        let textAnchor = 'middle';
        if (labelX < center - 10) textAnchor = 'end';
        if (labelX > center + 10) textAnchor = 'start';
        
        labels += `
            <text x="${labelX}" y="${labelY}" 
                  text-anchor="${textAnchor}" 
                  font-family="DM Mono, monospace" 
                  font-size="11" 
                  font-weight="600"
                  fill="#6b7290">
                ${p.dim.shortLabel}
            </text>
            <text x="${labelX}" y="${labelY + 14}" 
                  text-anchor="${textAnchor}" 
                  font-family="DM Mono, monospace" 
                  font-size="13" 
                  font-weight="700"
                  fill="#00d4ff">
                ${Math.round(p.dim.value)}
            </text>
        `;
    });

    return `
        <svg class="radar-canvas" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="radarGradient" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.4" />
                    <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.1" />
                </radialGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            ${levelCircles}
            ${radialLines}
            <path d="${pathData}" fill="url(#radarGradient)" stroke="#00d4ff" stroke-width="3" filter="url(#glow)"/>
            ${points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#00d4ff" stroke="#060810" stroke-width="2" filter="url(#glow)"/>`).join('')}
            ${labels}
        </svg>
    `;
}

        { icon: '🎯', label: 'Claridad de Nicho', value: scores.CL || 0 },

                </div>
                <a href="${whatsappUrl}" target="_blank" class="lc-whatsapp-btn" style="background:${m.color}">
                    <span class="lc-wa-icon">💬</span>
                    <span class="lc-wa-text">${content.cta}</span>
                </a>
                <div class="lc-cta-meta">
                    Tu score actual: <strong style="color:${m.color}">${VS}/100</strong> · 
                    Potencial: <strong style="color:var(--green)">${STATE.potentialScore}/100</strong>
                </div>
            </div>

            <div class="lc-trust">
                <span>✓ Respuesta en menos de 1 hora</span>
                <span>·</span>
                <span>✓ Análisis personalizado incluido</span>
            </div>
        </div>`;
}

function renderSuccess() {
    const level = STATE.detectedLevel;
    const m = CONFIG.levelSensors[level];
    const nextLevel = Math.min(level + 1, 4);
    const nextM = CONFIG.levelSensors[nextLevel];

    return `
        <div class="success-message">
            <div class="success-icon" style="background:${m.color}">✓</div>
            <h2>¡Reporte en camino!</h2>
            <p>Tu diagnóstico de Nivel ${level} · <strong style="color:${m.color}">${m.name}</strong> está siendo generado.</p>
            <p style="margin-top:12px;color:var(--muted)">Revisa tu bandeja en los próximos minutos.</p>

            ${level < 4 ? `
                <div class="success-next">
                    <div class="success-next-label">Tu próximo objetivo</div>
                    <div class="success-next-level" style="color:${nextM.color}">
                        Nivel ${nextLevel} · ${nextM.name}
                    </div>
                    <div class="success-next-desc">${nextM.desc}</div>
                </div>` : ''}

            <p class="success-hint">¿No lo ves? Revisa spam o promociones.</p>
        </div>`;
}

function renderError() {
    return `
        <div class="error-message">
            <h3>⚠ Algo salió mal</h3>
            <p>${STATE.errorMessage || 'Error inesperado. Intenta de nuevo.'}</p>
            <button class="retry-btn" id="retry-btn">Reintentar</button>
        </div>`;
}

function attachResultsListeners() {
    // No hay formulario - WhatsApp link directo
}

function attachErrorListeners() {
    document.getElementById('retry-btn')?.addEventListener('click', () => { STATE.view = 'input'; render(); });
}

function notifyParentHeight() {
    if (window.parent !== window) {
        window.parent.postMessage({ type: 'linkedin-visibility-resize', height: document.body.scrollHeight }, '*');
    }
}

initFactors();
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
} else {
    render();
}
    </script>

    <script>
        function notifyParentOfHeight() {
            const height = document.body.scrollHeight;
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'linkedin-visibility-resize',
                    height: height
                }, '*');
            }
        }
        const observer = new MutationObserver(notifyParentOfHeight);
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
        window.addEventListener('load', notifyParentOfHeight);
        notifyParentOfHeight();
    </script>
</body>
</html>
