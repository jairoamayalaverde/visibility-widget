<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Visibility Score | ¿Eres la opción obvia?</title>
    <meta name="description" content="Descubre en 3 minutos si tu perfil de LinkedIn te hace destacar o te hace invisible. Modelo determinístico VS = 0.30·AT + 0.30·AC + 0.40·CV">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #060810;
            --bg2:        #0c0f1a;
            --bg3:        #111525;
            --border:     #1e2235;
            --border2:    #2a2f4a;
            --text:       #e8ecf5;
            --muted:      #6b7290;
            --muted2:     #3d4260;
            --cyan:       #00d4ff;
            --violet:     #7c3aed;
            --rose:       #f43f5e;
            --amber:      #f59e0b;
            --green:      #10b981;
            --font-display: 'Syne', sans-serif;
            --font-body:    'DM Sans', sans-serif;
            --font-mono:    'DM Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 20px 60px;
            line-height: 1.6;
        }

        /* ── SCORE + BREAKDOWN UNIFICADO ──────────────── */
        .score-breakdown-card {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .sbc-top {
            display: grid;
            grid-template-columns: 220px 1fr;
        }
        @media (max-width: 640px) {
            .sbc-top { grid-template-columns: 1fr; }
        }
        .sbc-score-col {
            padding: 32px 28px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        @media (max-width: 640px) {
            .sbc-score-col { border-right: none; border-bottom: 1px solid var(--border); padding: 24px; }
        }
        .sbc-vs-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 3px;
            margin-bottom: 4px;
        }
        .sbc-vs-number {
            font-family: var(--font-display);
            font-size: 80px;
            font-weight: 800;
            color: var(--cyan);
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 14px;
        }
        .sbc-vs-max {
            font-size: 22px;
            color: var(--muted2);
            font-weight: 400;
            letter-spacing: 0;
        }
        .sbc-level-badge {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 2px;
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid;
            margin-bottom: 10px;
            width: fit-content;
        }
        .sbc-level-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 16px;
        }
        .sbc-dots { display: flex; gap: 6px; }
        .sbc-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border2);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted2);
        }
        .sbc-dot--on { color: var(--bg); font-weight: 700; }
        .sbc-dims-col { display: flex; flex-direction: column; }
        .cdc {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            border-left: 3px solid var(--cdc-color);
        }
        .cdc:last-child { border-bottom: none; }
        .cdc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .cdc-key { font-family: var(--font-mono); font-size: 12px; font-weight: 700; }
        .cdc-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
        .cdc-weight { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); }
        .cdc-score-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
        .cdc-score { font-family: var(--font-display); font-size: 32px; font-weight: 800; line-height: 1; }
        .cdc-status { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; }
        .cdc-ok { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); margin-left: auto; }
        .cdc-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
        .cdc-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
        .cdc-subpillars { display: flex; flex-direction: column; gap: 4px; padding-top: 4px; }
        .cdc-sp-row { display: flex; align-items: center; gap: 8px; }
        .cdc-sp-name { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); width: 70px; flex-shrink: 0; }
        .cdc-sp-track { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
        .cdc-sp-fill { height: 100%; border-radius: 1px; }
        .cdc-sp-val { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); width: 22px; text-align: right; }
        .sbc-meta {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 0;
        }
        .sbc-meta-item { display: flex; flex-direction: column; align-items: center; padding: 0 20px; gap: 2px; }
        .sbc-meta-item:first-child { padding-left: 0; }
        .sbc-meta-val { font-family: var(--font-display); font-size: 22px; font-weight: 800; line-height: 1; }
        .sbc-good     { color: var(--green); }
        .sbc-bad      { color: var(--rose); }
        .sbc-potential { color: var(--cyan); }
        .sbc-meta-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); letter-spacing: 1px; white-space: nowrap; }
        .sbc-meta-divider { width: 1px; height: 32px; background: var(--border); }
        .sbc-meta-profile { padding-left: 20px; align-items: flex-start; }
        .sbc-meta-url { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ── TRIGGER ALERT ────────────────────────────── */
        .trigger-alert {
            background: rgba(245,158,11,0.06);
            border: 1px solid rgba(245,158,11,0.35);
            border-left: 3px solid var(--amber);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .trigger-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .trigger-icon { font-size: 16px; }
        .trigger-title {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--amber);
            font-weight: 500;
            letter-spacing: 1px;
            flex: 1;
        }
        .trigger-penalty {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--rose);
            font-weight: 500;
        }
        .trigger-message {
            font-size: 14px;
            color: var(--muted);
            font-style: italic;
            line-height: 1.6;
        }

        /* ── LEVEL DOTS ────────────────────────────────── */
        .level-dots {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .level-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border2);
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted2);
            transition: all 0.3s;
        }
        .level-dot.active { color: var(--bg); font-weight: 700; }

        /* ── BREAKDOWN HEADER ──────────────────────────── */
        .breakdown-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .breakdown-level-note {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted2);
        }

        /* ── NEXT LEVEL GAP ────────────────────────────── */
        .gap-section {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 20px;
        }
        .gap-header { margin-bottom: 18px; }
        .gap-desc {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }
        .gap-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .gap-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        .gap-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
        }
        .gap-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 3px;
        }
        .gap-action {
            font-size: 12px;
            color: var(--muted);
            font-style: italic;
            line-height: 1.5;
        }

        /* ── QUESTION HINT ─────────────────────────────── */
        .question-hint {
            font-size: 13px;
            color: var(--muted2);
            margin-top: 10px;
            padding: 10px 14px;
            background: var(--bg3);
            border-radius: 6px;
            border-left: 2px solid var(--border2);
            line-height: 1.5;
        }

        /* ── NOISE TEXTURE OVERLAY ─────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ── HERO HEADER ───────────────────────────────── */
        .hero-section {
            text-align: center;
            padding: 60px 0 48px;
        }

        .hero-eyebrow {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .hero-section h1 {
            font-family: var(--font-display);
            font-size: clamp(32px, 6vw, 54px);
            font-weight: 800;
            line-height: 1.08;
            margin-bottom: 20px;
            color: var(--text);
            letter-spacing: -1px;
        }

        .hero-section h1 em {
            font-style: normal;
            color: var(--cyan);
        }

        .hero-section p {
            font-size: 17px;
            color: var(--muted);
            max-width: 520px;
            margin: 0 auto 32px;
            font-weight: 300;
        }

        .hero-formula {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--muted);
            background: var(--bg3);
            border: 1px solid var(--border2);
            padding: 8px 20px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        /* ── INPUT BOX ─────────────────────────────────── */
        .input-box {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transition: border-color 0.3s;
        }

        .input-box:hover { border-color: var(--cyan); }

        .input-icon {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .input-box label {
            display: block;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .input-box input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 16px 20px;
            color: var(--text);
            font-size: 16px;
            font-family: var(--font-mono);
            margin-bottom: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .input-box input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
        }

        .input-box input::placeholder { color: var(--muted2); }

        .input-hint {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .input-error {
            font-size: 13px;
            color: var(--rose);
            margin-bottom: 12px;
        }

        .analyze-btn {
            width: 100%;
            background: var(--cyan);
            color: var(--bg);
            border: none;
            padding: 18px 32px;
            border-radius: 8px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .analyze-btn:hover {
            background: #33ddff;
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0,212,255,0.25);
        }

        .trust-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 11px;
            color: var(--muted2);
            flex-wrap: wrap;
            font-family: var(--font-mono);
        }

        /* ── ONBOARDING SCREEN ─────────────────────────── */
        .onboarding-screen {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
        }

        .onboarding-check {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--green);
            color: var(--bg);
            font-size: 32px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: check-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes check-pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .onboarding-url {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--cyan);
            margin-bottom: 32px;
            padding: 10px 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: inline-block;
        }

        .onboarding-steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
            margin: 0 auto 28px;
            text-align: left;
        }

        .ob-step {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--muted2);
            font-family: var(--font-body);
            transition: color 0.3s;
            opacity: 0.4;
        }

        .ob-step.active { 
            color: var(--muted); 
            opacity: 1;
        }

        .ob-step.done { 
            color: var(--green); 
            opacity: 1;
        }

        .ob-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted2);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .ob-step.active .ob-dot { 
            background: var(--cyan); 
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .ob-step.done .ob-dot { 
            background: var(--green); 
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .onboarding-explainer {
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-left: 3px solid var(--cyan);
            border-radius: 10px;
            padding: 20px 24px;
            text-align: left;
            max-width: 480px;
            margin: 0 auto;
        }

        .onboarding-explainer p {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .onboarding-explainer p:last-child {
            margin-bottom: 0;
        }

        .onboarding-explainer strong {
            color: var(--text);
            font-weight: 600;
        }

        .ob-meta {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--muted2);
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 12px;
        }

        /* ── QUIZ ──────────────────────────────────────── */
        .quiz-container {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 36px;
        }

        .quiz-progress {
            margin-bottom: 28px;
        }

        .quiz-progress-track {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .quiz-progress-fill {
            height: 100%;
            background: var(--cyan);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .quiz-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
            font-family: var(--font-mono);
        }

        .quiz-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .dimension-badge {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .pillar-label {
            font-size: 11px;
            color: var(--muted);
            font-family: var(--font-mono);
        }

        .critical-badge {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--rose);
            border: 1px solid rgba(244,63,94,0.3);
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .quiz-question {
            margin-bottom: 32px;
        }

        .question-number {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .quiz-question h2 {
            font-family: var(--font-display);
            font-size: clamp(20px, 4vw, 26px);
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.2;
            color: var(--text);
        }

        .question-detail {
            font-size: 14px;
            color: var(--muted);
            font-style: italic;
            line-height: 1.5;
        }

        .quiz-answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        @media (max-width: 480px) {
            .quiz-answers { grid-template-columns: 1fr; }
        }

        .answer-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px 20px;
            border-radius: 10px;
            border: 1px solid var(--border2);
            background: var(--bg3);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-body);
        }

        .answer-btn:hover { border-color: var(--cyan); transform: translateY(-2px); }

        .answer-yes:hover, .answer-yes.selected {
            border-color: var(--green);
            background: rgba(16,185,129,0.08);
            box-shadow: 0 4px 20px rgba(16,185,129,0.1);
        }

        .answer-no:hover, .answer-no.selected {
            border-color: var(--rose);
            background: rgba(244,63,94,0.08);
            box-shadow: 0 4px 20px rgba(244,63,94,0.1);
        }

        .answer-icon {
            font-size: 24px;
            font-weight: 700;
        }

        .answer-yes .answer-icon { color: var(--green); }
        .answer-no  .answer-icon { color: var(--rose); }

        .answer-text {
            font-size: 14px;
            font-weight: 500;
        }

        .quiz-profile-ref {
            font-size: 11px;
            color: var(--muted2);
            text-align: center;
            font-family: var(--font-mono);
        }

        .quiz-profile-ref span { color: var(--muted); }

        /* ── ANALYZING ─────────────────────────────────── */
        .loading-state {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border2);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 28px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 8px;
            min-height: 20px;
        }

        .loading-domain {
            font-family: var(--font-mono);
            font-size: 15px;
            color: var(--cyan);
            margin-bottom: 32px;
        }

        .loading-steps {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 320px;
            margin: 0 auto;
            text-align: left;
        }

        .loading-step {
            display: flex;

        case 'onboarding': app.innerHTML = renderOnboarding(); runOnboarding();          break;
        case 'quiz':       app.innerHTML = renderQuiz();       attachQuizListeners();    break;

        case 'success':    app.innerHTML = renderSuccess();    break;

    }
    notifyParentHeight();
}

async function runScoring() {
    const stepTexts = [
        'Detectando nivel de madurez...',
        'Aplicando pesos dinámicos AT...',
        'Calculando Alcance (AC)...',
        'Calculando Conversión (CV)...',
        'Evaluando triggers de ajuste...',
        'Generando plan de intervención...'
    ];
    for (let i = 0; i < stepTexts.length; i++) {
        const txt = document.getElementById('loading-text');
        const step = document.getElementById(`step-${i}`);
        if (txt) txt.textContent = stepTexts[i];
        if (step) step.classList.add('active');
        await delay(380);
        if (i === 0) STATE.detectedLevel = detectLevel();
        if (i === 1) calculateScores();
        if (i === 4) evaluateTriggers();
        if (i === 5) {
            STATE.interventions = generateInterventions();
            STATE.potentialScore = calculatePotentialScore();
            STATE.nextLevelGap = getNextLevelGap();
        }
        if (step) step.classList.add('done');
    }
    await delay(250);
    STATE.view = 'results';
    render();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function detectLevel() {
    for (let lvl = 4; lvl >= 1; lvl--) {
        const sensor = CONFIG.levelSensors[lvl];
        if (sensor.positiveSignals.length === 0) {
            const negCount = sensor.negativeSignals.filter(id => !STATE.answers[id]).length;
            if (negCount >= sensor.threshold) return lvl;
        } else {
            const posCount = sensor.positiveSignals.filter(id => STATE.answers[id]).length;
            if (posCount >= sensor.threshold) return lvl;
        }
    }
    return 1;
}

function calculateScores() {
    const level = STATE.detectedLevel;
    const w = CONFIG.authorityWeights[level];

    const pvFactors = STATE.allFactors.filter(f => f.dimension === 'AT' && f.pillar === 'PV');
    const clFactors = STATE.allFactors.filter(f => f.dimension === 'AT' && f.pillar === 'CL');
    const afFactors = STATE.allFactors.filter(f => f.dimension === 'AT' && f.pillar === 'AF');

    const PV = rawScore(pvFactors);
    const CL = rawScore(clFactors);
    const AF = rawScore(afFactors);
    const AT = Math.round(PV * w.pv + CL * w.cl + AF * w.af);

    const AC = Math.round(rawScore(STATE.allFactors.filter(f => f.dimension === 'AC')));
    const CV = Math.round(rawScore(STATE.allFactors.filter(f => f.dimension === 'CV')));
    const VS_base = Math.round(AT * 0.30 + AC * 0.30 + CV * 0.40);

    STATE.scores = { AT, AC, CV, VS: VS_base, PV: Math.round(PV), CL: Math.round(CL), AF: Math.round(AF), VS_base };
}

function rawScore(factors) {
    if (!factors.length) return 0;
    let total = 0, achieved = 0;
    factors.forEach(f => { total += f.weight; if (STATE.answers[f.id]) achieved += f.weight; });
    return total > 0 ? (achieved / total) * 100 : 0;
}

function evaluateTriggers() {
    STATE.triggersActivated = [];
    Object.entries(CONFIG.triggers).forEach(([key, trigger]) => {
        if (trigger.condition(STATE.detectedLevel, STATE.scores)) {
            STATE.triggersActivated.push({ key, ...trigger });
            STATE.scores.VS = Math.max(0, STATE.scores.VS - trigger.penalty);
        }
    });
}

function generateInterventions() {
    const dimW = { CV: 0.40, AT: 0.30, AC: 0.30 };
    const w = CONFIG.authorityWeights[STATE.detectedLevel];
    return STATE.allFactors
        .filter(f => !STATE.answers[f.id])
        .map(f => {
            const pillarMult = f.dimension === 'AT'
                ? (f.pillar === 'PV' ? w.pv : f.pillar === 'CL' ? w.cl : w.af)
                : 1;
            return { ...f, impact: Math.round(f.weight * dimW[f.dimension] * pillarMult * 3.5) };
        })
        .sort((a, b) => {
            if (a.critical && !b.critical) return -1;
            if (!a.critical && b.critical) return 1;
            return b.impact - a.impact;
        })
        .slice(0, 5)
        .map(f => ({
            id: f.id, label: f.label, dimension: f.dimension,
            pillar: f.pillar, critical: f.critical, impact: f.impact,
            action: CONFIG.actions[f.id] || 'Optimizar este factor en tu perfil'
        }));
}

function calculatePotentialScore() {
    const triggerRecovery = STATE.triggersActivated.reduce((s, t) => s + t.penalty, 0);
    const gain = STATE.interventions.reduce((s, t) => s + t.impact, 0);
    return Math.min(STATE.scores.VS + triggerRecovery + gain, 100);
}

function getNextLevelGap() {
    if (STATE.detectedLevel >= 4) return [];
    const nextSensor = CONFIG.levelSensors[STATE.detectedLevel + 1];
    return nextSensor.positiveSignals
        .filter(id => !STATE.answers[id])
        .map(id => ({ id, label: CONFIG.factors[id]?.label || id, action: CONFIG.actions[id] || '' }));
}

                    <input type="email" id="email-input" placeholder="tu@email.com" required />
                </div>
                <button type="submit" class="submit-btn lc-btn" style="background:${m.color}">
                    ${cta}
                </button>
                <div class="privacy-note">🔒 Sin spam. Solo tu diagnóstico y plan de acción personalizado.</div>
            </form>
            <div class="lc-social">
                <span class="lc-social-dot"></span>
                <span>Diagnóstico enviado en menos de 5 minutos</span>
            </div>
        </div>`;
}

function renderSuccess() {
    const level = STATE.detectedLevel;
    const m = CONFIG.levelSensors[level];
    const nextLevel = Math.min(level + 1, 4);
    const nextM = CONFIG.levelSensors[nextLevel];

    return `
        <div class="success-message">
            <div class="success-icon" style="background:${m.color}">✓</div>
            <h2>¡Reporte en camino!</h2>
            <p>Tu diagnóstico de Nivel ${level} · <strong style="color:${m.color}">${m.name}</strong> está siendo generado.</p>
            <p style="margin-top:12px;color:var(--muted)">Revisa tu bandeja en los próximos minutos.</p>

            ${level < 4 ? `
                <div class="success-next">
                    <div class="success-next-label">Tu próximo objetivo</div>
                    <div class="success-next-level" style="color:${nextM.color}">
                        Nivel ${nextLevel} · ${nextM.name}
                    </div>
                    <div class="success-next-desc">${nextM.desc}</div>
                </div>` : ''}

            <p class="success-hint">¿No lo ves? Revisa spam o promociones.</p>
        </div>`;
}

function renderError() {
    return `
        <div class="error-message">
            <h3>⚠ Algo salió mal</h3>
            <p>${STATE.errorMessage || 'Error inesperado. Intenta de nuevo.'}</p>
            <button class="retry-btn" id="retry-btn">Reintentar</button>
        </div>`;
}

function attachResultsListeners() {
    document.getElementById('lead-form')?.addEventListener('submit', handleLeadSubmit);
}

function attachErrorListeners() {
    document.getElementById('retry-btn')?.addEventListener('click', () => { STATE.view = 'input'; render(); });
}

async function handleLeadSubmit(e) {
    e.preventDefault();
    const name  = document.getElementById('name-input').value.trim();
    const email = document.getElementById('email-input').value.trim();
    if (!name || !email) { alert('Completa todos los campos'); return; }

    const leadData = {
        name, email,
        profileUrl: STATE.profileUrl,
        detectedLevel: STATE.detectedLevel,
        scores: STATE.scores,
        triggersActivated: STATE.triggersActivated.map(t => t.key),
        answers: STATE.answers,
        interventions: STATE.interventions,
        potentialScore: STATE.potentialScore,
        timestamp: new Date().toISOString()
    };

    console.log('Lead capturado:', leadData);

    if (typeof gtag !== 'undefined') {
        gtag('event', 'generate_lead', { event_category: 'Lead', event_label: 'LinkedIn Visibility v2', value: STATE.scores.VS });
    }

    STATE.view = 'success';
    render();
}

function notifyParentHeight() {
    if (window.parent !== window) {
        window.parent.postMessage({ type: 'linkedin-visibility-resize', height: document.body.scrollHeight }, '*');
    }
}

initFactors();
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
} else {
    render();
}
    </script>

    <script>
        function notifyParentOfHeight() {
            const height = document.body.scrollHeight;
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'linkedin-visibility-resize',
                    height: height
                }, '*');
            }
        }
        const observer = new MutationObserver(notifyParentOfHeight);
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
        window.addEventListener('load', notifyParentOfHeight);
        notifyParentOfHeight();
    </script>
</body>
</html>
