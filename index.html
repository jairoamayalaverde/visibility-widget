<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visibility Score SEO | Jairo Amaya</title>
    <meta name="description" content="Descubre en 30 segundos qué está bloqueando la visibilidad de tu sitio en Google y ChatGPT">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HERO INPUT */
        .hero-section {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero-section h1 {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-section p {
            font-size: clamp(16px, 3vw, 20px);
            color: #999;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .input-box {
            background: #0a0a0a;
            border: 2px solid #1f1f1f;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .input-box:hover {
            border-color: #ec4899;
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.15);
        }

        .input-box label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }

        .input-box input {
            width: 100%;
            background: #000;
            border: 2px solid #222;
            padding: 20px 24px;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            margin-bottom: 24px;
            transition: all 0.2s ease;
        }

        .input-box input:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
        }

        .input-box input::placeholder {
            color: #444;
        }

        .analyze-btn {
            width: 100%;
            background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
            color: #fff;
            border: none;
            padding: 20px 32px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(236, 72, 153, 0.3);
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(236, 72, 153, 0.4);
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* LOADING */
        .loading-state {
            text-align: center;
            padding: 80px 40px;
            background: #0a0a0a;
            border: 2px solid #1f1f1f;
            border-radius: 24px;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 6px solid #1f1f1f;
            border-top: 6px solid #ec4899;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 32px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 12px;
        }

        .loading-domain {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading-progress {
            max-width: 400px;
            margin: 32px auto 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1f1f1f;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ec4899 0%, #a855f7 100%);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-label {
            font-size: 13px;
            color: #666;
        }

        /* RESULTS HERO */
        .results-hero {
            background: linear-gradient(135deg, #1a0a1a 0%, #0a0a1a 100%);
            border: 3px solid #ec4899;
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .results-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .score-label-top {
            position: relative;
            z-index: 1;
            font-size: 11px;
            font-weight: 900;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .score-value-hero {
            position: relative;
            z-index: 1;
            font-size: clamp(96px, 20vw, 160px);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 16px;
        }

        .score-value-hero .number {
            background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .score-value-hero .max {
            font-size: 0.35em;
            color: #333;
        }

        .score-value-hero .indicator {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: #10b981;
            border-radius: 50%;
            margin-left: 16px;
            vertical-align: middle;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        .score-value-hero .indicator.warning { background: #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
        .score-value-hero .indicator.critical { background: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }

        .score-status {
            position: relative;
            z-index: 1;
            display: inline-block;
            padding: 8px 24px;
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 900;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .score-status.warning { background: rgba(245, 158, 11, 0.2); border-color: #f59e0b; color: #f59e0b; }
        .score-status.critical { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444; }

        .score-domain {
            position: relative;
            z-index: 1;
            font-size: 18px;
            font-weight: 700;
            color: #999;
        }

        /* IMPACT METRICS */
        .impact-section {
            background: #0a0a0a;
            border: 2px solid #1f1f1f;
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
        }

        .impact-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 32px;
            text-align: center;
        }

        .impact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
        }

        .impact-card {
            text-align: center;
            padding: 24px;
            background: #000;
            border: 1px solid #1f1f1f;
            border-radius: 16px;
        }

        .impact-value {
            font-size: 36px;
            font-weight: 900;
            color: #ef4444;
            margin-bottom: 8px;
        }

        .impact-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* EVIDENCE + PLAN GRID */
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }

        @media (max-width: 968px) {
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }

        .evidence-panel, .plan-panel {
            background: #0a0a0a;
            border: 2px solid #1f1f1f;
            border-radius: 24px;
            padding: 32px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 900;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #1f1f1f;
        }

        .evidence-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #0f0f0f;
        }

        .evidence-item:last-child {
            border-bottom: none;
        }

        .evidence-name {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .evidence-value {
            font-size: 16px;
            font-weight: 700;
            color: #10b981;
        }

        .evidence-value.warning { color: #f59e0b; }
        .evidence-value.critical { color: #ef4444; }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .task-text {
            flex: 1;
            font-size: 14px;
            color: #fff;
            line-height: 1.5;
        }

        .task-impact {
            font-size: 16px;
            font-weight: 900;
            color: #10b981;
            flex-shrink: 0;
        }

        .potential-score {
            margin-top: 24px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
            border: 2px solid #10b981;
            border-radius: 16px;
            text-align: center;
        }

        .potential-label {
            font-size: 12px;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .potential-value {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* LEAD CAPTURE */
        .lead-capture {
            background: linear-gradient(135deg, #1a0a1a 0%, #0a0a1a 100%);
            border: 3px solid #ec4899;
            border-radius: 32px;
            padding: 60px 40px;
            margin-bottom: 40px;
            text-align: center;
        }

        .lead-capture h2 {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 900;
            margin-bottom: 16px;
        }

        .lead-capture p {
            font-size: 18px;
            color: #999;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .lead-capture ul {
            list-style: none;
            text-align: left;
            max-width: 500px;
            margin: 0 auto 40px;
        }

        .lead-capture li {
            font-size: 15px;
            color: #ccc;
            margin-bottom: 12px;
            padding-left: 32px;
            position: relative;
        }

        .lead-capture li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: 900;
            font-size: 20px;
        }

        .lead-form {
            max-width: 500px;
            margin: 0 auto;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 568px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .lead-form input {
            width: 100%;
            background: #000;
            border: 2px solid #333;
            padding: 18px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .lead-form input:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
        }

        .lead-form input::placeholder {
            color: #444;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
            border: none;
            padding: 20px 32px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(16, 185, 129, 0.4);
        }

        .privacy-note {
            font-size: 12px;
            color: #666;
            margin-top: 16px;
        }

        /* SUCCESS STATE */
        .success-message {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
            border: 2px solid #10b981;
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
        }

        .success-message h2 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 16px;
            color: #10b981;
        }

        .success-message p {
            font-size: 16px;
            color: #999;
        }

        /* ERROR STATE */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid #ef4444;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
        }

        .error-message h3 {
            color: #ef4444;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .retry-btn {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-section">
            <h1>¿Tu sitio está invisible para Google y ChatGPT?</h1>
            <p>Descubre en 30 segundos exactamente qué está bloqueando tu visibilidad y cuánto dinero estás dejando en la mesa</p>
        </div>

        <div id="app"></div>
    </div>

    <script src="./widget.js"></script>
    
    <!-- Auto-resize para iframe -->
    <script>
        function notifyParentOfHeight() {
            const height = document.body.scrollHeight;
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'visibility-widget-resize',
                    height: height
                }, '*');
            }
        }

        const observer = new MutationObserver(notifyParentOfHeight);
        observer.observe(document.body, { 
            childList: true, 
            subtree: true, 
            attributes: true 
        });

        window.addEventListener('load', notifyParentOfHeight);
        notifyParentOfHeight();
    </script>
</body>
</html>
